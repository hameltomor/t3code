<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>Offline — XBE Code</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Poppins, ui-sans-serif, system-ui, sans-serif;
        background: #0a0a0a;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
        opacity: 0.5;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        font-weight: 400;
        line-height: 1.5;
        color: #d1d5db;
        margin-bottom: 24px;
      }
      button {
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        background: #ff006e;
        color: #fff;
        border: none;
        border-radius: 0;
        padding: 10px 24px;
        cursor: pointer;
      }
      button:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
      <h1>You're offline</h1>
      <p>XBE Code needs a network connection. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
